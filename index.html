<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alazeaz Matrex - تسجيل الدخول</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- خلفية متحركة -->
    <div class="bg-animation">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="shape shape-4"></div>
        <div class="shape shape-5"></div>
    </div>

    <!-- الجسيمات -->
    <div class="particles" id="particles"></div>

    <!-- الحاوية الرئيسية -->
    <div class="container">
        <div class="form-card">
            <!-- العنوان العلوي -->
            <div class="brand">
                <h1 class="brand-name">Alazeaz Matrex</h1>
                <div class="brand-line"></div>
            </div>

            <!-- علامات التبويب -->
            <div class="tabs">
                <button class="tab active" data-tab="login">تسجيل الدخول</button>
                <button class="tab" data-tab="signup">إنشاء حساب</button>
                <div class="tab-indicator"></div>
            </div>

            <!-- نموذج تسجيل الدخول -->
            <form class="form active" id="loginForm">
                <div class="input-group">
                    <input type="email" id="loginEmail" required autocomplete="email">
                    <label for="loginEmail">البريد الإلكتروني</label>
                    <span class="input-icon">📧</span>
                </div>

                <div class="input-group">
                    <input type="password" id="loginPassword" required autocomplete="current-password">
                    <label for="loginPassword">كلمة المرور</label>
                    <span class="input-icon toggle-password" data-target="loginPassword">👁️</span>
                </div>

                <div class="form-options">
                    <label class="checkbox-wrapper">
                        <input type="checkbox" id="remember">
                        <span class="checkmark"></span>
                        تذكرني
                    </label>
                    <a href="#" class="forgot-link">نسيت كلمة المرور؟</a>
                </div>

                <button type="submit" class="submit-btn">
                    <span>تسجيل الدخول</span>
                    <div class="btn-glow"></div>
                </button>

                <div class="divider">
                    <span>أو</span>
                </div>

                <div class="social-login">
                    <button type="button" class="social-btn">
                        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                        Google
                    </button>
                    <button type="button" class="social-btn">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.879V14.89h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.989C18.343 21.129 22 16.99 22 12c0-5.523-4.477-10-10-10z"/></svg>
                        Facebook
                    </button>
                </div>
            </form>

            <!-- نموذج إنشاء حساب -->
            <form class="form" id="signupForm">
                <div class="input-group">
                    <input type="text" id="signupName" required>
                    <label for="signupName">الاسم الكامل</label>
                    <span class="input-icon">👤</span>
                </div>

                <div class="input-group">
                    <input type="email" id="signupEmail" required>
                    <label for="signupEmail">البريد الإلكتروني</label>
                    <span class="input-icon">📧</span>
                </div>

                <div class="input-group">
                    <input type="tel" id="signupPhone" required>
                    <label for="signupPhone">رقم الهاتف</label>
                    <span class="input-icon">📱</span>
                </div>

                <div class="input-group">
                    <input type="password" id="signupPassword" required>
                    <label for="signupPassword">كلمة المرور</label>
                    <span class="input-icon toggle-password" data-target="signupPassword">👁️</span>
                </div>

                <div class="input-group">
                    <input type="password" id="signupConfirm" required>
                    <label for="signupConfirm">تأكيد كلمة المرور</label>
                    <span class="input-icon toggle-password" data-target="signupConfirm">👁️</span>
                </div>

                <div class="form-options">
                    <label class="checkbox-wrapper">
                        <input type="checkbox" id="agree" required>
                        <span class="checkmark"></span>
                        أوافق على <a href="#" class="terms-link">الشروط والأحكام</a>
                    </label>
                </div>

                <button type="submit" class="submit-btn">
                    <span>إنشاء حساب</span>
                    <div class="btn-glow"></div>
                </button>
            </form>

            <!-- رسالة النجاح -->
            <div class="success-message" id="successMessage">
                <div class="success-icon">✓</div>
                <h3>تم بنجاح!</h3>
                <p id="successText">جاري تحويلك...</p>
            </div>
        </div>

        <!-- تذييل -->
        <footer class="footer">
            <p>برمجه <span class="programmer">ضياء الحوامده</span></p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
